services:
  - type: web
    name: dora-api
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install uv && uv sync --frozen --no-dev
    startCommand: uv run uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.13.0"
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: DATABASE_URL
        sync: false
      - key: AQUIFER_API_KEY
        sync: false
      - key: AQUIFER_BASE_URL
        value: https://api.aquifer.bible
      - key: CORS_ORIGINS
        sync: false
